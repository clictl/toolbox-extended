name: Validate Extended Toolbox

on:
  pull_request:
    paths: ['toolbox/**/*.yaml']
  push:
    paths: ['toolbox/**/*.yaml']
    branches: [main]

jobs:
  validate:
    name: Validate specs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install clictl
        run: curl -fsSL https://download.clictl.dev/install.sh | sh

      - name: Validate specs
        run: clictl toolbox validate toolbox/
